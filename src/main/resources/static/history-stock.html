<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PCS 입출고 이력 화면입니다. 부품의 입고 및 출고 기록을 조회합니다.">
    <title>PCS | 입출고 이력</title>
    <link rel="icon" href="/images/parts-control-station-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/core/tokens.css?20260618_layers">
    <link rel="stylesheet" href="/css/core/base.css?20260618_layers">
    <link rel="stylesheet" href="/css/layouts/workspace.css?20260703_quick_bar_no_overlap">
    <link rel="stylesheet" href="/css/components/components.css?20260623_drawer_clip_fix">
    <link rel="stylesheet" href="/css/components/workflow.css?20260618_layers">
    <link rel="stylesheet" href="/css/components/feedback.css?20260619_md_alignment">
    <link rel="stylesheet" href="/css/pages/history-stock.css?20260712_fixed_detail_cards">
</head>
<body class="has-collapsible-sidebar page-history-stock workspace-page">
<div class="workspace-layout">
    <div data-workspace-sidebar data-active-route="history/stock"></div>

    <div class="workspace-quick-bar" data-workspace-quick-bar data-watch-target=".workspace-header .header-actions" aria-hidden="true">
        <button class="menu-toggle" type="button" data-sidebar-toggle aria-controls="workspace-sidebar" aria-expanded="false" aria-label="메뉴 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M4 7h16" />
                <path d="M4 12h16" />
                <path d="M4 17h16" />
            </svg>
        </button>
        <button class="workspace-quick-brand" type="button" data-scroll-top aria-label="입출고 이력 화면 맨 위로 이동">
            <span>입출고 이력</span>
        </button>
        <div class="workspace-quick-actions">
            <a class="btn btn-secondary" data-route="documents">전표 조회</a>
        </div>
    </div>

    <main class="workspace-main stock-history-page">
        <header class="workspace-header">
            <button class="menu-toggle" type="button" data-sidebar-toggle aria-controls="workspace-sidebar" aria-expanded="false" aria-label="메뉴 열기">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 7h16" />
                    <path d="M4 12h16" />
                    <path d="M4 17h16" />
                </svg>
            </button>
            <div class="page-title-row">
                <span class="page-icon page-icon-solid" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <g transform="matrix(1.1 0 0 1.2 2 0)">
                            <path fill="currentColor" d="m10 7.961l3.03-1.211l-7.5-3l-2.586 1.034a1.5 1.5 0 0 0-.364.209zM2.035 5.853A1.5 1.5 0 0 0 2 6.177v3.08a4.5 4.5 0 0 1 5.561 6.184l1.94 1.938v-8.54zm8.465 11.88q.409-.059.8-.215l5.757-2.302A1.5 1.5 0 0 0 18 13.823V6.177q0-.167-.035-.324L10.5 8.838zm6.921-12.74l-3.046 1.218l-7.5-3l1.825-.73a3.5 3.5 0 0 1 2.6 0l5.757 2.303a1.5 1.5 0 0 1 .364.209M3.5 17c.786 0 1.512-.26 2.096-.697l2.55 2.55a.5.5 0 1 0 .708-.707l-2.55-2.55A3.5 3.5 0 1 0 3.5 17m0-1a2.5 2.5 0 1 1 0-5a2.5 2.5 0 0 1 0 5" />
                        </g>
                    </svg>
                </span>
                <div>
                    <p class="page-kicker">이력</p>
                    <h1>입출고 이력</h1>
                    <p class="page-description">입고, 출고, 취소 전표를 통합 조회합니다.</p>
                </div>
            </div>
            <div class="header-actions">
                <a class="btn btn-secondary" data-route="documents">전표 조회</a>
            </div>
        </header>

        <section class="content-grid stock-history-grid">
            <div class="content-main">
                <section class="filter-card management-filter-card stock-history-filter-card" aria-labelledby="filter-title">
                    <div class="stock-history-filter-heading">
                        <div>
                            <h2 id="filter-title">이력 검색</h2>
                            <p>전표, 거래처, 품목, 기간으로 입출고 기록을 조회합니다.</p>
                        </div>
                    </div>
                    <!-- API: GET /api/workspaces/{companyCode}/stock/documents?documentType=&keyword=&documentStatus=&dateFrom=&dateTo=&page=&size= -->
                    <form class="filter-form management-filter-form stock-history-filter-form" action="#" method="get" autocomplete="off" data-history-filter-form>
                        <label class="stock-history-keyword-field">
                            <span>검색어</span>
                            <input type="search" name="keyword" placeholder="전표 번호, 거래처, 품목명">
                        </label>
                        <label>
                            <span>구분</span>
                            <select name="documentType">
                                <option value="">전체</option>
                                <option value="INBOUND">입고</option>
                                <option value="OUTBOUND">출고</option>
                            </select>
                        </label>
                        <label>
                            <span>상태</span>
                            <select name="documentStatus">
                                <option value="">전체</option>
                                <option value="COMPLETED">완료</option>
                                <option value="CANCELED">취소</option>
                            </select>
                        </label>
                        <fieldset class="stock-history-date-range">
                            <legend>기간</legend>
                            <input type="date" name="dateFrom" aria-label="시작일">
                            <span aria-hidden="true">~</span>
                            <input type="date" name="dateTo" aria-label="종료일">
                        </fieldset>
                        <div class="stock-history-filter-actions">
                            <button class="btn btn-primary" type="submit">검색</button>
                            <button class="btn btn-secondary" type="button" data-history-filter-reset>초기화</button>
                        </div>
                    </form>
                </section>

                <section class="table-card stock-history-list-card" aria-labelledby="history-list-title">
                    <div class="table-header inline-summary-header stock-history-summary-header">
                        <div>
                            <h2 id="history-list-title">전표 목록</h2>
                            <p>행을 선택하면 오른쪽에서 상세를 확인합니다.</p>
                        </div>
                        <div class="list-summary-box" aria-label="전표 목록 요약" data-history-summary>
                            <dl class="list-summary">
                                <div>
                                    <dt>전표</dt>
                                    <dd data-history-summary-total>0</dd>
                                </div>
                                <div>
                                    <dt>수량</dt>
                                    <dd data-history-summary-quantity>0</dd>
                                </div>
                                <div>
                                    <dt>취소</dt>
                                    <dd data-history-summary-canceled>0</dd>
                                </div>
                            </dl>
                        </div>
                    </div>

                    <div class="data-table document-data-table stock-history-table" role="table" aria-label="입출고 이력" data-history-table>
                        <div class="data-row document-data-row stock-history-row table-head" role="row">
                            <span role="columnheader">구분</span>
                            <span role="columnheader">전표 번호</span>
                            <span role="columnheader">내용</span>
                            <span role="columnheader">수량</span>
                            <span role="columnheader">상태</span>
                            <span role="columnheader">처리일</span>
                        </div>
                        <div class="data-row document-data-row empty-data-row" role="row" data-history-empty hidden>
                            <span role="cell" data-label="안내">이력을 불러오는 중입니다.</span>
                        </div>
                    </div>
                    <div class="pagination-bar" data-history-pagination hidden>
                        <p data-page-info>1 / 1 페이지</p>
                        <div class="pagination-actions">
                            <button type="button" data-page-prev>이전</button>
                            <button type="button" data-page-next>다음</button>
                        </div>
                    </div>
                </section>
            </div>

            <aside class="right-side-drawer document-detail-drawer management-detail-drawer stock-history-detail-drawer" data-history-detail-drawer aria-labelledby="history-detail-title" aria-hidden="true" tabindex="-1">
                <div class="panel-card right-side-drawer-panel document-detail-panel management-detail-drawer-panel">
                    <div class="panel-mode is-active">
                        <div class="panel-title-bar">
                            <div>
                                <h2 id="history-detail-title">전표 상세</h2>
                                <p data-detail-subtitle>전표를 선택해 주세요.</p>
                            </div>
                            <button class="panel-link-button" type="button" data-close-detail-panel>닫기</button>
                        </div>

                        <div class="drawer-scroll-body stock-history-detail-body">
                            <div class="document-detail-card">
                                <strong data-detail-document-no>-</strong>
                                <div class="detail-badge-row">
                                    <em class="badge badge-gray" data-detail-type>-</em>
                                    <em class="badge badge-active" data-detail-status>-</em>
                                </div>
                            </div>

                            <dl class="detail-list">
                                <div>
                                    <dt>거래처</dt>
                                    <dd data-detail-partner>-</dd>
                                </div>
                                <div>
                                    <dt>처리자</dt>
                                    <dd data-detail-created-at>-</dd>
                                </div>
                                <div>
                                    <dt>처리일</dt>
                                    <dd data-detail-processed-by>-</dd>
                                </div>
                                <div>
                                    <dt>사유</dt>
                                    <dd data-detail-reason>-</dd>
                                </div>
                            </dl>

                            <div class="document-line-section">
                                <div class="section-title-row">
                                    <h3>품목 요약</h3>
                                    <span data-detail-line-summary>-</span>
                                </div>
                                <div class="document-line-list right-side-scroll-list" data-detail-lines>
                                    <p class="detail-empty-text">전표를 선택해 주세요.</p>
                                </div>
                            </div>
                        </div>
                        <div class="stock-history-detail-actions" data-detail-actions></div>
                    </div>
                </div>
            </aside>
        </section>
    </main>
</div>
<script src="/js/pcs-api.js?20260623_memory_token"></script>
<script src="/js/pcs-pagination.js?20260527_pagination"></script>
<script src="/js/workspace-layout.js?20260624_quick_bar"></script>
<script src="/js/pcs-ui.js?20260527_1"></script>
<script src="/js/pcs-common.js?20260625_right_drawer_v2"></script>
<script src="/js/history-stock.js?20260709_part_units_link"></script>
</body>
</html>
