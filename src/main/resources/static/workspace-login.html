<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PCS 업체 작업공간 로그인 화면입니다.">
    <title>PCS | 업체 로그인</title>
    <link rel="icon" href="/images/parts-control-station-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/workspace-login.css?20260522_6">
</head>
<body>
<a class="page-brand" href="/" aria-label="PCS 메인">
    <img src="/images/parts-control-station-icon.svg" alt="" width="38" height="38">
    <span>
        <strong>PCS</strong>
        <small>Parts Control Station</small>
    </span>
</a>

<main class="login-page">
    <section class="login-card" aria-labelledby="login-title">
        <div class="login-left">
            <h1 id="login-title">로그인</h1>

            <form class="login-form" id="workspaceLoginForm" novalidate>
                <div class="workspace-chip" id="workspaceChip" hidden>
                    <span>접속 중인 업체 코드</span>
                    <strong id="workspaceCodeText">company-code</strong>
                </div>

                <div class="field-stack">
                    <label class="field" id="companyCodeField">
                        <span>업체 코드</span>
                        <input id="companyCode" name="companyCode" type="text" placeholder="예: seoul-parts" autocomplete="organization">
                        <small>회사 관리자에게 받은 업체 코드를 입력하세요.</small>
                    </label>

                    <label class="field">
                        <span>아이디</span>
                        <input id="loginId" name="loginId" type="text" placeholder="예: admin01" autocomplete="username" required>
                    </label>

                    <label class="field">
                        <span>비밀번호</span>
                        <input id="password" name="password" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
                    </label>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" id="loginButton" type="submit">업무 페이지로 이동</button>
                </div>
                <p class="form-message" id="loginMessage" role="status" aria-live="polite"></p>
            </form>
        </div>

        <div class="login-right">
            <div class="guide-header">
                <span class="guide-label">로그인 안내</span>
                <span class="guide-badge" id="guideBadge">업체 선택 필요</span>
            </div>

            <h2 id="guide-title">업체 코드와 계정 정보를 입력하세요.</h2>

            <div class="guide-card is-active">
                <span class="guide-card-label" id="currentAccessLabel">현재 접속 방식</span>
                <strong id="currentAccessTitle">업체 코드를 입력해야 합니다.</strong>
                <p id="currentAccessDescription">회사 관리자에게 받은 업체 코드, 아이디, 비밀번호를 입력하세요.</p>
            </div>

            <div class="guide-card">
                <span class="guide-card-label">로그인 후 이동</span>
                <strong>업무 대시보드</strong>
                <p>부품 재고, 입고, 검수, 출고, 이력 관리 메뉴를 이어서 사용할 수 있습니다.</p>
            </div>

            <div class="guide-note">
                <strong>로그인이 안 되나요?</strong>
                <p>업체 코드, 아이디, 임시 비밀번호는 회사 관리자에게 확인하세요.</p>
            </div>
        </div>
    </section>

    <p class="register-prompt">
        PCS 이용이 처음이신가요?
        <a href="/company/register">회사 등록</a>
    </p>
</main>

<script src="/js/pcs-api.js?20260529_workspace_guard"></script>
<script src="/js/workspace-login.js?20260529_workspace_guard"></script>
</body>
</html>
