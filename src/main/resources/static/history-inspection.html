<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PCS 검수 이력 화면입니다. 전표 기준으로 검수 이력을 조회하고 관리번호별 상세 기록을 확인합니다.">
    <title>PCS | 검수 이력</title>
    <link rel="icon" href="/images/parts-control-station-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/core/tokens.css?20260618_layers">
    <link rel="stylesheet" href="/css/core/base.css?20260618_layers">
    <link rel="stylesheet" href="/css/layouts/workspace.css?20260703_quick_bar_no_overlap">
    <link rel="stylesheet" href="/css/components/components.css?20260623_drawer_clip_fix">
    <link rel="stylesheet" href="/css/components/feedback.css?20260619_md_alignment">
    <link rel="stylesheet" href="/css/pages/history-inspection.css?20260624_result_align">
</head>
<body class="has-collapsible-sidebar page-history-inspection workspace-page">
<div class="workspace-layout">
    <div data-workspace-sidebar data-active-route="history/inspection"></div>

    <div class="workspace-quick-bar" data-workspace-quick-bar data-watch-target=".workspace-header .header-actions" aria-hidden="true">
        <button class="menu-toggle" type="button" data-sidebar-toggle aria-controls="workspace-sidebar" aria-expanded="false" aria-label="메뉴 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M4 7h16" />
                <path d="M4 12h16" />
                <path d="M4 17h16" />
            </svg>
        </button>
        <button class="workspace-quick-brand" type="button" data-scroll-top aria-label="검수 이력 화면 맨 위로 이동">
            <span>검수 이력</span>
        </button>
        <div class="workspace-quick-actions">
            <a class="btn btn-secondary" data-route="inspection">검수 관리</a>
            <a class="btn btn-secondary" data-route="inspection/templates">검수 템플릿</a>
        </div>
    </div>

    <main class="workspace-main">
        <header class="workspace-header">
            <button class="menu-toggle" type="button" data-sidebar-toggle aria-controls="workspace-sidebar" aria-expanded="false" aria-label="메뉴 열기">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 7h16" />
                    <path d="M4 12h16" />
                    <path d="M4 17h16" />
                </svg>
            </button>
            <div class="page-title-row">
                <span class="page-icon page-icon-solid" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <g transform="matrix(0.0104167 0 0 0.0104167 1.04 0.67)">
                            <path fill="currentColor" d="M1152 640H512V512h640zM256 1664h681l-64 128H128V128h1408v640h-128V256H256zm256-384h617l-64 128H512zm512-384v128H512V896zm939 967q14 28 14 57q0 26-10 49t-27 41t-41 28t-50 10h-754q-26 0-49-10t-41-27t-28-41t-10-50q0-29 14-57l299-598v-241h-128V896h640v128h-128v241zm-242-199l-185-369v-271h-128v271l-185 369z" />
                        </g>
                    </svg>
                </span>
                <div>
                    <p class="page-kicker">이력</p>
                    <h1>검수 이력</h1>
                    <p class="page-description">전표 기준으로 검수 이력을 조회합니다.</p>
                </div>
            </div>
            <div class="header-actions">
                <a class="btn btn-secondary" data-route="inspection">검수 관리</a>
                <a class="btn btn-secondary" data-route="inspection/templates">검수 템플릿</a>
            </div>
        </header>

        <section class="content-grid history-content-grid">
            <div class="content-main">
                <section class="filter-card management-filter-card history-filter-card" aria-labelledby="filter-title">
                    <div class="history-filter-heading">
                        <h2 id="filter-title">이력 검색</h2>
                    </div>
                    <!-- API: GET /api/workspaces/{companyCode}/inspections/history-documents?keyword=&inspectionType=&dateFrom=&dateTo=&page=&size= -->
                    <form class="filter-form management-filter-form history-filter-form" action="#" method="get" autocomplete="off" data-history-filter-form>
                        <label class="history-keyword-field">
                            <span>검색어</span>
                            <input type="search" name="keyword" placeholder="전표 번호, 품목명, 관리번호" autocomplete="off">
                        </label>
                        <fieldset class="history-date-range">
                            <legend>기간</legend>
                            <input type="date" name="dateFrom" aria-label="시작일">
                            <span aria-hidden="true">~</span>
                            <input type="date" name="dateTo" aria-label="종료일">
                        </fieldset>
                        <label class="history-filter-select">
                            <span>이력 유형</span>
                            <select name="inspectionType">
                                <option value="">전체</option>
                                <option value="INITIAL">최초 검수</option>
                                <option value="CORRECTION">정정</option>
                                <option value="REINSPECTION">재검수</option>
                            </select>
                        </label>
                        <div class="history-filter-actions">
                            <button class="btn btn-primary" type="submit">검색</button>
                            <button class="btn btn-secondary" type="button" data-history-filter-reset>초기화</button>
                        </div>
                    </form>
                </section>

                <section class="table-card history-section-card history-document-card" aria-labelledby="history-document-title">
                    <div class="table-header inline-summary-header">
                        <div>
                            <h2 id="history-document-title">전표 목록</h2>
                        </div>
                    </div>

                    <div class="data-table document-data-table history-document-table" role="table" aria-label="전표 목록" data-history-document-table>
                        <div class="data-row document-data-row history-document-row table-head" role="row">
                            <span role="columnheader">전표 번호</span>
                            <span role="columnheader">품목 요약</span>
                            <span role="columnheader">검수 건수</span>
                            <span role="columnheader">불합격 건수</span>
                            <span role="columnheader">최근 검수일</span>
                        </div>
                        <div class="data-row document-data-row empty-data-row" role="row">
                            <span role="cell" data-label="안내">이력을 불러오는 중입니다.</span>
                        </div>
                    </div>
                    <div class="pagination-bar" data-history-pagination hidden>
                        <p data-page-info>1 / 1 페이지</p>
                        <div class="pagination-actions">
                            <button type="button" data-page-prev>이전</button>
                            <button type="button" data-page-next>다음</button>
                        </div>
                    </div>
                </section>

                <section class="table-card history-section-card history-unit-card" aria-labelledby="history-unit-title" data-history-unit-section hidden>
                    <div class="table-header inline-summary-header history-unit-header">
                        <div>
                            <h2 id="history-unit-title">전표 상세</h2>
                            <p data-history-document-scope></p>
                        </div>
                        <button type="button" class="history-clear-document" data-history-clear-document hidden>선택 해제</button>
                    </div>

                    <div class="history-document-detail-layout">
                        <aside class="history-part-group-panel" aria-labelledby="history-part-group-title">
                            <div class="history-panel-title-row">
                                <h3 id="history-part-group-title">품목 묶음</h3>
                                <span data-history-part-count>0개</span>
                            </div>
                            <div class="history-part-group-list" data-history-part-groups aria-label="선택 전표 품목 묶음"></div>
                        </aside>

                        <div class="history-unit-list-panel">
                            <div class="history-panel-title-row">
                                <h3>관리번호 목록</h3>
                                <span data-history-unit-count>0개</span>
                            </div>

                            <div class="history-unit-filter" data-history-unit-filter hidden aria-label="전표 내 검수 이력 필터">
                                <button type="button" class="is-active" data-history-filter="ALL">전체</button>
                                <button type="button" data-history-filter="INITIAL">최초 검수</button>
                                <button type="button" data-history-filter="CORRECTION">정정</button>
                                <button type="button" data-history-filter="REINSPECTION">재검수</button>
                                <button type="button" data-history-filter="FAIL">불합격</button>
                            </div>
                            <div class="history-unit-refine" data-history-unit-refine hidden aria-label="관리번호 목록 상세 필터">
                                <label>
                                    <span>검수 결과</span>
                                    <select data-history-result-filter>
                                        <option value="">전체</option>
                                        <option value="PASS">통과</option>
                                        <option value="FAIL">불합격</option>
                                        <option value="WARN">주의</option>
                                    </select>
                                </label>
                                <label>
                                    <span>등급</span>
                                    <select data-history-grade-filter>
                                        <option value="">전체</option>
                                        <option value="NONE">미정</option>
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                        <option value="DEFECTIVE">불량</option>
                                    </select>
                                </label>
                            </div>

                            <div class="data-table document-data-table history-unit-table" role="table" aria-label="관리번호 목록" data-history-unit-table>
                                <div class="data-row document-data-row history-unit-row table-head" role="row">
                                    <span role="columnheader">관리번호</span>
                                    <span role="columnheader">품목</span>
                                    <span role="columnheader">최근 결과</span>
                                    <span role="columnheader">이력 건수</span>
                                    <span role="columnheader">최근 처리일</span>
                                </div>
                            </div>
                            <div class="pagination-bar history-unit-pagination" data-history-unit-pagination hidden>
                                <p data-history-unit-page-info>1 / 1 페이지</p>
                                <div class="pagination-actions">
                                    <button type="button" data-history-unit-page-prev>이전</button>
                                    <button type="button" data-history-unit-page-next>다음</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>
</div>

<aside class="right-side-drawer right-side-drawer-panel history-detail-panel" data-history-detail-panel role="complementary" aria-labelledby="history-detail-panel-title" tabindex="-1" hidden>
    <header class="history-detail-panel-header">
        <div>
            <p class="history-panel-kicker">검수 상세 이력</p>
            <h2 id="history-detail-panel-title">관리번호 상세</h2>
            <p data-history-detail-scope></p>
        </div>
        <button type="button" class="history-panel-close" data-history-detail-close aria-label="상세 패널 닫기">×</button>
    </header>
    <div class="history-detail-body" data-history-detail-body>
        <p class="detail-empty-text">상세 이력을 불러오는 중입니다.</p>
    </div>
</aside>

<script src="/js/pcs-api.js?20260623_memory_token"></script>
<script src="/js/pcs-pagination.js?20260527_pagination"></script>
<script src="/js/workspace-layout.js?20260624_quick_bar"></script>
<script src="/js/pcs-ui.js?20260527_1"></script>
<script src="/js/pcs-common.js?20260625_right_drawer_v2"></script>
<script src="/js/history-inspection.js?20260707_deep_link"></script>
</body>
</html>
