<aside class="workspace-sidebar" id="workspace-sidebar" aria-label="업무 메뉴">
    <a class="sidebar-brand" href="/">
        <img src="/images/parts-control-station-icon.svg" alt="" width="38" height="38">
        <span>
            <strong>PCS</strong>
            <small data-company-code>workspace</small>
        </span>
    </a>

    <nav class="sidebar-nav" aria-label="업무 화면 이동">
        <a data-route="dashboard">운영 현황</a>

        <div class="sidebar-group">
            <div class="sidebar-group-title">업무</div>
            <a data-route="inbound/new" data-staff-permission="STAFF_INBOUND">입고</a>
            <a data-route="inspection" data-staff-permission="STAFF_INSPECTION">검수</a>
            <a data-route="outbound/new" data-staff-permission="STAFF_OUTBOUND">출고</a>
        </div>

        <div class="sidebar-group">
            <div class="sidebar-group-title">이력</div>
            <a data-route="history/stock">입출고 이력</a>
            <a data-route="history/inspection">검수이력</a>
        </div>

        <div class="sidebar-group">
            <div class="sidebar-group-title">관리</div>

            <div class="sidebar-subgroup" data-sidebar-subgroup>
                <button class="sidebar-subgroup-toggle" type="button" data-sidebar-subgroup-toggle aria-expanded="false">
                    <span>입출고 관리</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>
                <div class="sidebar-submenu" data-sidebar-submenu hidden>
                    <a data-route="inbound" data-staff-permission="STAFF_INBOUND">입고 관리</a>
                    <a data-route="outbound" data-staff-permission="STAFF_OUTBOUND">출고 관리</a>
                </div>
            </div>
            <a data-route="part-units">
                <span class="sidebar-nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" focusable="false">
                        <path fill="currentColor" d="m17.578 4.432l-2-1.05C13.822 2.461 12.944 2 12 2s-1.822.46-3.578 1.382l-.321.169l8.923 5.099l4.016-2.01c-.646-.732-1.688-1.279-3.462-2.21m4.17 3.534l-3.998 2V13a.75.75 0 0 1-1.5 0v-2.286l-3.5 1.75v9.44c.718-.179 1.535-.607 2.828-1.286l2-1.05c2.151-1.129 3.227-1.693 3.825-2.708c.597-1.014.597-2.277.597-4.8v-.117c0-1.893 0-3.076-.252-3.978M11.25 21.904v-9.44l-8.998-4.5C2 8.866 2 10.05 2 11.941v.117c0 2.525 0 3.788.597 4.802c.598 1.015 1.674 1.58 3.825 2.709l2 1.049c1.293.679 2.11 1.107 2.828 1.286M2.96 6.641l9.04 4.52l3.411-1.705l-8.886-5.078l-.103.054c-1.773.93-2.816 1.477-3.462 2.21"></path>
                    </svg>
                </span>
                <span>부품 관리</span>
            </a>
            <a data-route="inspection/templates" data-staff-permission="STAFF_INSPECTION">검수 템플릿</a>
            <a data-route="partners">거래처 관리</a>
            <a data-route="users" data-allowed-roles="OWNER,ADMIN" hidden>사용자 관리</a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-session">
            <span>접속 계정</span>
            <strong data-session-name>확인 중</strong>
        </div>
        <div class="sidebar-account-actions" aria-label="계정 작업">
            <button class="sidebar-icon-button" type="button" data-sidebar-settings aria-label="마이페이지로 이동" title="마이페이지">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.05a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.05a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.05a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.15.48.62 1 1.55 1H21a2 2 0 0 1 0 4h-.05A1.7 1.7 0 0 0 19.4 15Z"></path>
                </svg>
            </button>
            <button class="sidebar-icon-button" type="button" data-sidebar-logout aria-label="로그아웃" title="로그아웃">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <path d="M16 17l5-5-5-5"></path>
                    <path d="M21 12H9"></path>
                </svg>
            </button>
        </div>
    </div>
</aside>
<button class="sidebar-backdrop" type="button" data-sidebar-backdrop aria-label="메뉴 닫기"></button>
