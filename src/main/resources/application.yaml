spring:
  application:
    name: pcs-api
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/pcs_db}
    username: ${DB_USER:localuser}
    password: "${DB_PASSWORD:pcs123#}"
    driver-class-name: org.mariadb.jdbc.Driver

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pcs:
  jwt:
    secret: ${PCS_JWT_SECRET:pcs-local-development-jwt-secret-change-before-production-2026}
    access-token-expiration-minutes: ${PCS_JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-expiration-days: ${PCS_JWT_REFRESH_TOKEN_DAYS:14}
